[build]
  publish = "."

# Clean URLs
[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 200

[[redirects]]
  from = "/shop"
  to = "/shop.html"
  status = 200

[[redirects]]
  from = "/dispensers"
  to = "/dispensers.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/how-it-works"
  to = "/how-it-works.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/order"
  to = "/order.html"
  status = 200

[[redirects]]
  from = "/water-delivery"
  to = "/water-delivery.html"
  status = 200

[[redirects]]
  from = "/delivery-areas"
  to = "/delivery-areas.html"
  status = 200

[[redirects]]
  from = "/bottle-pickup"
  to = "/bottle-pickup.html"
  status = 200

[[redirects]]
  from = "/my-orders"
  to = "/my-orders.html"
  status = 200

[[redirects]]
  from = "/water-filtration"
